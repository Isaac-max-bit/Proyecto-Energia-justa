<h2 class="bg-success p-3 text-light text-center">REGIONS</h2>

<div class="row">
    <div class="col s4">
        <div class="card" style="width: 35rem;">
            <div class="card-body">
                <h5 class="card-title">Region Creator</h5>
                    <div class="input-group input-group-sm mb-3">
                        <span class="input-group-text bg-success">New Region</span>
                        <input type="text" class="form-control" [(ngModel)]="newRegion.name" placeholder="Region name">
                    </div>

                    <h5 class="card-title">Country Selector</h5>
                    <div class="input-group input-group-sm mb-3">
                        <span class="input-group-text bg-success">Country Selector</span>
                        <select [(ngModel)]="newRegion.country" class="form-select form-select-sm" aria-label="Small select example">
                            <option [ngValue]="undefined" disabled selected>Select a country</option>
                            @for(c of countries; track $index){
                            <option [ngValue]="c">
                                {{c.name}}
                            </option>
                            }
                        </select>
                    </div>
                <button (click)="saveRegion()" class="btn btn-outline-success">Create region</button>
            </div>
        </div>
    </div>

    <div class="col s8 mt-2">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Country</th>
                </tr>
            </thead>

            <tbody>
           <!--      <tr *ngFor="let r of regions"> -->
                   <!--  @for(r of regions;track r.id){
                    <tr>
                        <td>{{r.id}}</td>
                        <td>{{r.name}}</td>
                        <td>{{r.country?.name}}</td>
                    </tr>
                    } -->
              <!--   </tr> -->
            </tbody>
        </table>
    </div>
</div>
