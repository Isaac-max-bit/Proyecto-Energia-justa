<div class="card mb-5 shadow-sm">
    <div class="card-header bg-primary text-white">Registrar Nuevo Usuario</div>
    <div class="card-body">
        <form [formGroup]="userForm" (ngSubmit)="addUser()" class="row g-3">
            <div class="col-md-4">
                <input type="text" formControlName="username" class="form-control" placeholder="Nombre de usuario">
            </div>
            <div class="col-md-4">
                <input type="email" formControlName="email" class="form-control" placeholder="Correo electrónico">
            </div>
            <div class="col-md-2">
                <select formControlName="role" class="form-select" aria-label="Seleccionar rol del usuario" title="Rol">
                    <option value="administrador">Administrador</option>
                    <option value="usuario">Usuario</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" [disabled]="userForm.invalid" class="btn btn-success w-100">Agregar</button>
            </div>
        </form>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    @for (u of users; track u.id) {
    <div class="col">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{u.username}}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{u.email}}</h6>
                <p class="card-text">{{u.role}}</p>
            </div>
            <div class="card-footer d-flex gap-2">
                
                <button class="btn btn-sm btn-outline-warning w-50">Editar</button>
                <button (click)="deleteUser(u.id)" class="btn btn-sm btn-outline-danger w-50">Eliminar</button>
            </div>
        </div>
    </div>
    }
</div>
