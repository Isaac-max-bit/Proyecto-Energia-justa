<h2>Countries</h2>
<div class="input-group input-group-sm mb-3 browser-default">
    <span class="input-group-text rounded-1" id="inputGroup-sizing-sm">New Country</span>
    <input type="text" [(ngModel)]="newCountry.name" placeholder="Country name">
</div>

<button (click)="saveCountry()">Guardar</button>

@for (c of countries; track c.name){
    <ul>
    <li>
    {{c.name}}
    </li>
    </ul>
}
