# Nombre de la aplicación
spring.application.name=energia

# 1. Configuración de la Base de Datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/NOMBRE_DE_TU_BD
spring.datasource.username=postgres
spring.datasource.password=TU_CONTRASEŃA
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Configuración de Swagger UI / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Esta línea ayuda a que Swagger ordene los endpoints alfabéticamente
springdoc.swagger-ui.operationsSorter=alpha